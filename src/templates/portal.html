<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=5.0"
    />
    <meta name="description" content="Članci portala {{title}}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/semantic-ui@2.2.13/dist/semantic.min.css"
    />
    <title>{{title}}</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html {
        height: auto !important;
        overflow-y: scroll;
      }
      body {
        height: auto !important;
        min-height: 100vh;
        margin: 0 !important;
        padding: 0 !important;
        background: #f4f6f8;
        color: #3a3f47;
      }
      .page-wrap {
        padding: 1.5em;
        padding-bottom: 3em;
      }
      .ui.segment {
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .ui.pointing.menu {
        border-radius: 10px;
        box-shadow: none;
        border-bottom: 2px solid #e8eaed;
        flex-wrap: wrap;
      }
      h2 {
        color: #2e3440;
        font-weight: 600;
      }
      p {
        color: #5a6270;
        line-height: 1.6;
      }
      a {
        color: #5b8abf;
      }
      a:hover {
        color: #3d6a9e;
      }
      .ui.primary.button {
        background: #5b8abf;
        border-radius: 8px;
        transition: background 0.2s ease;
      }
      .ui.primary.button:hover {
        background: #4a7aad;
      }
      .ui.secondary.button {
        background: #8e9aaf;
        color: #fff;
        border-radius: 8px;
        transition: background 0.2s ease;
      }
      .ui.secondary.button:hover {
        background: #7a8699;
      }
      @media only screen and (max-width: 767px) {
        .page-wrap {
          padding: 0.5em;
          padding-bottom: 2em;
        }
        h2 {
          font-size: 1.3em;
        }
        p {
          font-size: 0.92em;
        }
      }
    </style>
  </head>
  <body>
    {{ga}}
    <div class="page-wrap">
      <div class="ui pointing menu">{{links}}</div>
      <h2 style="text-align: center; margin-top: 1em">{{title}}</h2>
      <p style="text-align: center">{{stats}}</p>
      {{articles}}
    </div>
  </body>
</html>
