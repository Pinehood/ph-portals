<a
  href="/portals/@portal@"
  class="@active@item"
  title="@name@"
  style="
    display: inline-flex;
    align-items: center;
    padding: 0.6em 0.8em;
    border-radius: 6px;
    transition: background 0.2s ease;
    min-width: 36px;
    min-height: 36px;
    justify-content: center;
  "
  ><img
    src="@link@"
    style="
      max-width: 16px;
      max-height: 16px;
      margin: auto;
      opacity: 0.85;
    "
/></a>
