<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=5.0"
    />
    <meta
      name="description"
      content="Članak portala {{portalName}}: {{title}}"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/semantic-ui@2.2.13/dist/semantic.min.css"
    />
    <title>Portali - {{portalName}}</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      html {
        height: auto !important;
        overflow-y: scroll;
      }
      body {
        height: auto !important;
        min-height: 100vh;
        margin: 0 !important;
        padding: 0 !important;
        background: #f4f6f8;
        color: #3a3f47;
      }
      .page-wrap {
        padding: 1.5em;
        padding-bottom: 3em;
      }
      .ui.segment {
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .ui.pointing.menu {
        border-radius: 10px;
        box-shadow: none;
        border-bottom: 2px solid #e8eaed;
        flex-wrap: wrap;
      }
      .ui.celled.table {
        border-radius: 8px;
        border-color: #e0e3e8;
      }
      .ui.celled.table thead th {
        background: #f0f2f5;
        color: #5a6270;
        font-weight: 600;
      }
      .ui.celled.table td {
        color: #4a4f58;
      }
      h1 {
        color: #2e3440;
        margin-top: 1.2em;
        word-wrap: break-word;
      }
      h3 {
        color: #5a6270;
        font-weight: 400;
        line-height: 1.6;
      }
      p {
        line-height: 1.8;
        color: #4a4f58;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      a {
        color: #5b8abf;
      }
      a:hover {
        color: #3d6a9e;
      }
      .ui.primary.button {
        background: #5b8abf;
        border-radius: 8px;
        transition: background 0.2s ease;
      }
      .ui.primary.button:hover {
        background: #4a7aad;
      }
      .ui.secondary.button {
        background: #8e9aaf;
        color: #fff;
        border-radius: 8px;
        transition: background 0.2s ease;
      }
      .ui.secondary.button:hover {
        background: #7a8699;
      }
      .article-meta {
        display: none;
      }
      .article-buttons {
        margin-top: 1.5em;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 0.5em;
      }
      .article-buttons .ui.button {
        margin: 0;
      }
      @media only screen and (max-width: 767px) {
        .page-wrap {
          padding: 0.5em;
          padding-bottom: 2em;
        }
        .content-segment {
          padding: 1em !important;
          margin-top: 0.8em !important;
        }
        .ui.celled.table {
          display: none;
        }
        .article-meta {
          display: block;
          margin-bottom: 0.5em;
        }
        .article-meta .meta-row {
          display: flex;
          justify-content: space-between;
          padding: 0.5em 0;
          border-bottom: 1px solid #eef0f3;
          font-size: 0.92em;
        }
        .article-meta .meta-row:last-child {
          border-bottom: none;
        }
        .article-meta .meta-label {
          color: #5a6270;
          font-weight: 600;
        }
        .article-meta .meta-value {
          color: #4a4f58;
          text-align: right;
        }
        h1 {
          font-size: 1.4em;
          margin-top: 0.8em;
        }
        h3 {
          font-size: 1em;
        }
        .article-buttons {
          flex-direction: column;
        }
        .article-buttons a {
          display: block;
        }
        .article-buttons .ui.button {
          width: 100%;
          float: none !important;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    {{ga}}
    <div class="page-wrap">
      <div class="ui pointing menu">{{links}}</div>
      <div
        class="ui segment content-segment"
        style="margin-top: 1.5em; padding: 2em"
      >
        <table class="ui celled table">
          <thead>
            <tr>
              <th>Autor</th>
              <th>Objavljeno</th>
              <th>Portal</th>
              <th>Original</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>{{author}}</td>
              <td>{{time}}</td>
              <td>
                <a target="_blank" href="{{portalLink}}">{{portalName}}</a>
              </td>
              <td>
                <a target="_blank" href="{{articleLink}}">Otvori</a>
              </td>
            </tr>
          </tbody>
        </table>
        <div class="article-meta">
          <div class="meta-row">
            <span class="meta-label">Autor</span>
            <span class="meta-value">{{author}}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Objavljeno</span>
            <span class="meta-value">{{time}}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Portal</span>
            <span class="meta-value">
              <a target="_blank" href="{{portalLink}}">{{portalName}}</a>
            </span>
          </div>
          <div class="meta-row">
            <span class="meta-label">Original</span>
            <span class="meta-value">
              <a target="_blank" href="{{articleLink}}">Otvori</a>
            </span>
          </div>
        </div>
        <h1>{{title}}</h1>
        <h3>{{lead}}</h3>
        <p>{{content}}</p>
        <div class="article-buttons">
          <a href="{{articleLink}}" target="_blank">
            <button class="ui primary button">Otvori</button>
          </a>
          <a href="{{backLink}}">
            <button class="ui secondary button">Povratak</button>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
